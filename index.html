<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>GitHub Issues Tracker</title>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white shadow-lg rounded-xl p-8 w-[400px]">
      <div class="text-center mb-6">
        <img class="w-14 block mx-auto pb-2" src="./assets/github-logo.png" alt="Logo" />
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>

      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm mb-1 font-medium text-gray-700">Username</label>
          <input
            id="username"
            type="text"
            class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-purple-500"
            placeholder="Enter Username"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm mb-1 font-medium text-gray-700">Password</label>
          <input
            id="password"
            type="password"
            class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-purple-500"
            placeholder="Enter Password"
          />
        </div>

        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition duration-200">
          Sign In
        </button>
      </form>

      <div class="relative flex items-center">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="flex-shrink mx-4 text-gray-600 text-sm font-medium">OR</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <div class="text-center">
        <p class="text-slate-400 text-sm mt-3">Demo Credentials:</p>
        <div class="bg-slate-50/80 rounded-xl p-3 border border-gray-50">
          <p class="text-slate-700 text-lg">
            <span class="font-bold">Username:</span> admin
          </p>
          <p class="text-slate-700 text-lg">
            <span class="font-bold">Password:</span> admin123
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
