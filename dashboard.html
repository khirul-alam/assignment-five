
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>GitHub Issues Tracker</title>
</head>
<body class="bg-slate-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-slate-200 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-8 h-8" />
                <h1 class="text-xl font-bold text-slate-800">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input id="searchInput" type="text" placeholder="Search issues..." class="border border-slate-300 p-2.5 rounded-xl w-full md:w-80 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" />
                <button class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition shadow-md shadow-emerald-100">New Issue</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 px-4">
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="loadIssues('all')" class="tabBtn bg-indigo-600 text-white px-8 py-2.5 rounded-lg font-bold shadow-md transition-all flex items-center gap-2">
                All <span id="allCount" class="bg-white/20 px-2 py-0.5 rounded-md text-xs">0</span>
            </button>
            <button onclick="loadIssues('open')" class="tabBtn bg-white border border-slate-200 text-slate-600 px-8 py-2.5 rounded-lg font-bold hover:bg-slate-50 transition-all flex items-center gap-2">
                Open <span id="openCount" class="bg-slate-100 px-2 py-0.5 rounded-md text-xs">0</span>
            </button>
            <button onclick="loadIssues('closed')" class="tabBtn bg-white border border-slate-200 text-slate-600 px-8 py-2.5 rounded-lg font-bold hover:bg-slate-50 transition-all flex items-center gap-2">
                Closed <span id="closedCount" class="bg-slate-100 px-2 py-0.5 rounded-md text-xs">0</span>
            </button>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-3 rounded-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/565/565547.png" class="w-8 h-8" alt="tracker icon">
                </div>
                <div>
                    <h2 class="text-2xl font-black text-slate-800"><span id="currentStatusCount">0</span> Issues</h2>
                    <p id="currentStatusLabel" class="text-slate-500 text-sm font-medium">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-sm"></span>
                    <span class="text-slate-600 text-sm font-bold">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500 shadow-sm"></span>
                    <span class="text-slate-600 text-sm font-bold">Closed</span>
                </div>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl p-10 flex flex-col gap-6">
            <h2 id="modalTitle" class="text-3xl font-extrabold text-slate-900"></h2>
            <div id="modalLine2" class="flex items-center gap-2 text-sm font-bold uppercase text-slate-400"></div>
            <div id="modalLabels" class="flex flex-wrap gap-2"></div>
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <p id="modalDesc" class="text-slate-600 text-lg"></p>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center gap-4 sm:gap-12 py-4 border-t border-slate-100">
                <div class="flex items-center gap-2">
                    <span class="text-slate-400 text-sm font-bold uppercase">Assignee:</span>
                    <span id="modalAssignee" class="text-slate-900 font-extrabold text-lg"></span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-slate-400 text-sm font-bold uppercase">Priority:</span>
                    <span id="modalPriority" class="px-4 py-1 rounded-lg text-white font-black text-xs"></span>
                </div>
            </div>
            <div class="flex justify-end mt-2">
                <button onclick="closeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-2xl font-black text-sm uppercase transition-all shadow-xl shadow-indigo-200">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
